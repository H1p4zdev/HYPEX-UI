name: Generate Jetpack Compose Template

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (e.g., HypexUI-Toolbox)'
        required: true
        default: 'HypexUI-Toolbox'
        type: string
      package_name:
        description: 'Package name (e.g., com.hypex.toolbox)'
        required: true
        default: 'com.hypex.toolbox'
        type: string
      min_sdk:
        description: 'Minimum SDK version'
        required: true
        default: '26'
        type: number
      target_sdk:
        description: 'Target SDK version'
        required: true
        default: '35'
        type: number
      compile_sdk:
        description: 'Compile SDK version'
        required: true
        default: '35'
        type: number
      agp_version:
        description: 'Android Gradle Plugin version'
        required: true
        default: '9.2.0'
        type: string
      kotlin_version:
        description: 'Kotlin version'
        required: true
        default: '2.4.0'
        type: string
      gradle_version:
        description: 'Gradle version'
        required: true
        default: '9.5.1'
        type: string
      create_tag:
        description: 'Create a git tag after generation?'
        required: true
        default: true
        type: boolean
      tag_name:
        description: 'Tag name (if create_tag is true)'
        required: false
        default: 'v1.0.0'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ═══ Step 1: Set up Java ═══
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ═══ Step 2: Set up Android SDK ═══
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ═══ Step 3: Install required SDK platforms ═══
      - name: Install Android SDK platforms
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-${{ inputs.compile_sdk }}" \
            "build-tools;${{ inputs.compile_sdk }}.0.0" \
            "platform-tools" || true
          echo "✅ SDK platforms installed"

      # ═══ Step 4: Set up Gradle ═══
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ═══ Step 5: Generate all project source files ═══
      - name: Generate project source files
        run: |
          chmod +x .github/scripts/generate-project.sh
          bash .github/scripts/generate-project.sh
        env:
          APP_NAME: ${{ inputs.app_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          MIN_SDK: ${{ inputs.min_sdk }}
          TARGET_SDK: ${{ inputs.target_sdk }}
          COMPILE_SDK: ${{ inputs.compile_sdk }}
          AGP_VERSION: ${{ inputs.agp_version }}
          KOTLIN_VERSION: ${{ inputs.kotlin_version }}
          GRADLE_VERSION: ${{ inputs.gradle_version }}

      # ═══ Step 6: Generate Gradle wrapper (uses gradle CLI from step 4) ═══
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version ${{ inputs.gradle_version }}
          chmod +x gradlew
          echo "✅ Gradle wrapper generated (gradlew, gradlew.bat, gradle-wrapper.jar)"

      # ═══ Step 7: Create local.properties ═══
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ═══ Step 8: Verify project compiles ═══
      - name: Verify project compiles
        run: |
          echo "📦 Building project to verify..."
          ./gradlew assembleDebug --no-daemon 2>&1 || {
            echo "⚠️  Build failed — check the logs above"
            exit 1
          }
          echo "✅ Project compiles successfully!"

      # ═══ Step 9: Commit and push to repo ═══
      - name: Commit and push generated project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎉 Generate Jetpack Compose template: ${{ inputs.app_name }}

            - App: ${{ inputs.app_name }}
            - Package: ${{ inputs.package_name }}
            - SDK: min=${{ inputs.min_sdk }} target=${{ inputs.target_sdk }} compile=${{ inputs.compile_sdk }}
            - AGP: ${{ inputs.agp_version }} | Kotlin: ${{ inputs.kotlin_version }} | Gradle: ${{ inputs.gradle_version }}

            Generated by GitHub Actions"
            git push origin HEAD:${{ github.ref_name }}
          fi

      # ═══ Step 10: Create git tag ═══
      - name: Create git tag
        if: ${{ inputs.create_tag }}
        run: |
          git tag ${{ inputs.tag_name }}
          git push origin ${{ inputs.tag_name }}
          echo "✅ Tag ${{ inputs.tag_name }} created"
